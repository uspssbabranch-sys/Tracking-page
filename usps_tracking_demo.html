
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>USPS Tracking</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#f4f6fb;margin:0;padding:40px}
.card{max-width:900px;margin:auto;background:#fff;border-radius:10px;box-shadow:0 10px 25px rgba(0,0,0,0.08);padding:30px}
h1{margin-top:0}
.status{display:inline-block;padding:8px 14px;border-radius:20px;background:#e8f0ff;font-weight:bold}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
.timeline{margin-top:30px;border-left:2px dashed #ccc;padding-left:20px}
.event{margin-bottom:20px}
.small{color:#666;font-size:14px}
</style>
</head>
<body>

<div class="card">
<h1>USPS Tracking</h1>

<div class="status">Processing</div>

<div class="grid">
<div>
<p><strong>Tracking Number:</strong><br>801576807905678127</p>
<p><strong>Courier:</strong><br>USPS</p>
<p><strong>Sender Location:</strong><br>USA</p>
</div>

<div>
<p><strong>Delivery Address:</strong><br>
735 Mill Street<br>
Space C-16<br>
Reno, NV 89502</p>

<p><strong>Estimated Delivery:</strong><br>
17 March 2026</p>
</div>
</div>

<div class="timeline">
<h3>Tracking Updates</h3>

<div class="event">
<div><strong>Package received for processing</strong></div>
<div class="small">United States Postal Facility</div>
<div class="small">14 March 2026</div>
</div>

</div>

</div>

</body>
</html>
